name: CasparCG-Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        casparcg-version: ["2.5", "2.4"]
    steps:
      - uses: actions/checkout@v4
      - name: Start Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

          echo "Starting Xvfb..."
          Xvfb :99 -screen 0 1024x768x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3 # Wait for Xvfb to start

      - name: Install CasparCG Server ${{ matrix.casparcg-version }}
        run: |
          VERSION="${{ matrix.casparcg-version }}"
          RELEASES=$(curl -s https://api.github.com/repos/CasparCG/server/releases)

          if echo "$RELEASES" | jq -e '.message' > /dev/null 2>&1; then
            echo "GitHub API Error:"
            echo "$RELEASES" | jq -r '.message'
            exit 1
          fi

          TAG=$(echo "$RELEASES" | jq -r "[.[] | select(.tag_name | startswith(\"v${VERSION}\"))] | .[0].tag_name")
          if [ "$TAG" = "null" ] || [ -z "$TAG" ]; then
            echo "No release found for version ${VERSION}"
            exit 1
          fi

          echo "Installing CasparCG Server $TAG"

          # Get download URLs
          CEF_URL=$(echo "$RELEASES" | jq -r "[.[] | select(.tag_name == \"$TAG\")] | .[0].assets[] | select(.name | contains(\"cef\") and contains(\"noble\")) | .browser_download_url" | head -n1)
          SERVER_URL=$(echo "$RELEASES" | jq -r "[.[] | select(.tag_name == \"$TAG\")] | .[0].assets[] | select(.name | contains(\"server\") and contains(\"noble\") and endswith(\".deb\")) | .browser_download_url" | head -n1)

          echo "Downloading CEF: $CEF_URL"
          wget -q "$CEF_URL" -O cef.deb

          echo "Downloading Server: $SERVER_URL"
          wget -q "$SERVER_URL" -O server.deb

          # Install packages
          sudo dpkg -i cef.deb server.deb || true
          sudo apt-get install -f -y

          # Verify installation
          which casparcg-server-${VERSION} || echo "CasparCG Server ${VERSION} not in PATH"

      - name: Start CasparCG Server
        run: |
          casparcg-server-${{ matrix.casparcg-version }} > /tmp/casparcg.log 2>&1 &
          CASPARCG_PID=$!
          echo "CASPARCG_PID=$CASPARCG_PID" >> $GITHUB_ENV
          sleep 5 # Wait for server to start

      - name: Stop CasparCG Server
        if: always()
        run: |
          if [ ! -z "$CASPARCG_PID" ]; then
            echo "Stopping CasparCG Server (PID: $CASPARCG_PID)"
            kill $CASPARCG_PID || true
          fi

          # Show logs for debugging
          if [ -f /tmp/casparcg.log ]; then
            echo "=== CasparCG Logs ==="
            cat /tmp/casparcg.log
          fi
